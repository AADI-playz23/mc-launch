name: LunarHost Engine

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Target Username'
        required: true
      server_name:
        description: 'Server Name'
        required: true
        default: 'My Server'
      software:
        description: 'Server Software'
        required: true
        default: 'paper'
      version:
        description: 'Minecraft Version'
        required: true
        default: '1.21.4'
  repository_dispatch:
    types: [renew_server]

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Engine (mc-launch)
        uses: actions/checkout@v4
        
      - name: Checkout Storage (mc-disk)
        uses: actions/checkout@v4
        with:
          repository: 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/mc-disk
          token: ${{ secrets.LUNAR_DB_TOKEN }}
          path: mc-disk

      - name: Setup Java 21 (Required for 1.20.5+)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' 

      - name: Run LunarHost Core
        env:
          # This maps the inputs from either the website (workflow_dispatch) 
          # OR the 6-hour loop (repository_dispatch) into the launch.sh script
          USERNAME: ${{ github.event.inputs.username || github.event.client_payload.username }}
          SERVER_NAME: ${{ github.event.inputs.server_name || github.event.client_payload.server_name }}
          SOFTWARE: ${{ github.event.inputs.software || github.event.client_payload.software }}
          VERSION: ${{ github.event.inputs.version || github.event.client_payload.version }}
        run: |
          chmod +x launch.sh
          ./launch.sh

      - name: Loop Next Cycle
        if: always()
        run: |
          # This triggers the exact same server to boot back up when the 6 hours end,
          # passing all the user's settings over to the new machine.
          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -d '{
            "event_type": "renew_server", 
            "client_payload": {
              "username": "${{ env.USERNAME }}", 
              "server_name": "${{ env.SERVER_NAME }}", 
              "software": "${{ env.SOFTWARE }}", 
              "version": "${{ env.VERSION }}"
            }
          }'
