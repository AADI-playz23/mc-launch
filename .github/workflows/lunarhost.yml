name: LunarHost Engine

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Target Username'
        required: true
      software:
        description: 'Server Software'
        required: true
        default: 'paper'
      version:
        description: 'Minecraft Version'
        required: true
        default: '1.20.4'
  repository_dispatch:
    types: [renew_server]

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: AADI-playz23/mc-disk
          token: ${{ secrets.LUNAR_DB_TOKEN }}
          path: mc-disk

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run Core
        env:
          USERNAME: ${{ github.event.inputs.username || github.event.client_payload.username }}
          SOFTWARE: ${{ github.event.inputs.software || github.event.client_payload.software }}
          VERSION: ${{ github.event.inputs.version || github.event.client_payload.version }}
        run: |
          chmod +x launch.sh
          ./launch.sh

      - name: Loop Next Cycle
        if: always()
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -d '{"event_type": "renew_server", "client_payload": {"username": "${{ env.USERNAME }}", "software": "${{ env.SOFTWARE }}", "version": "${{ env.VERSION }}"}}'
