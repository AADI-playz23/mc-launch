name: Run Server
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      instance_id:
        required: true
      ram:
        required: true
      java:
        required: true
      software:
        required: false
        default: 'paper.json'
      version:
        required: false
        default: 'latest'

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Dynamic Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java }}

      - name: Fetch Orchestrator Scripts
        uses: actions/checkout@v3

      - name: Pull Cloud Storage Array
        run: |
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git storage_repo
          mkdir -p server-env
          cp -r storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}/* server-env/ || echo "New instance, no existing files."
          
      - name: Install Dependencies
        run: npm install ws

      - name: Start Tunnels & Push IP
        run: |
          wget https://github.com/localtunnel/localtunnel/archive/refs/heads/master.zip
          unzip master.zip
          cd localtunnel-master
          npm install
          node bin/lt.js --port 8080 > tunnel_url.txt &
          sleep 5
          WS_URL=$(cat tunnel_url.txt | sed 's/https:\/\//wss:\/\//')
          curl -X POST -d "instance_id=${{ github.event.inputs.instance_id }}&ws_url=${WS_URL}&status=online" "http://abmchost.rf.gd/update_ip.php"

      - name: Ignite Server
        run: |
          cd server-env
          node ../server.js "${{ github.event.inputs.username }}" "${{ github.event.inputs.ram }}" "${{ github.event.inputs.software }}" "${{ github.event.inputs.version }}"

      - name: Save & Relay Protocol (Bulletproof Sync)
        if: always()
        run: |
          echo "Preparing Instance Directory..."
          TARGET_DIR="storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}"
          mkdir -p $TARGET_DIR
          
          echo "Syncing Volumes..."
          rsync -av --exclude='storage_repo' server-env/ $TARGET_DIR/
          
          echo "Pushing State to Cloud..."
          cd storage_repo
          git config user.name "Absora Relay Engine"
          git config user.email "relay@absora.com"
          git add .
          git commit -m "Automated Relay Save for instance_${{ github.event.inputs.instance_id }}" || echo "No state changes to save."
          git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main

      - name: Trigger Next 24/7 Relay
        if: always()
        run: |
          if [ -f "server-env/relay.flag" ]; then
            curl -X POST -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.ABSORA_PAT }}" \
            https://api.github.com/repos/AADI-playz23/mc-launch/actions/workflows/run.yml/dispatches \
            -d '{"ref":"main","inputs":{"username":"${{ github.event.inputs.username }}","instance_id":"${{ github.event.inputs.instance_id }}","ram":"${{ github.event.inputs.ram }}","java":"${{ github.event.inputs.java }}","software":"${{ github.event.inputs.software }}","version":"${{ github.event.inputs.version }}"}}'
          fi
