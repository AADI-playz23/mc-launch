name: Run Server
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      instance_id:
        required: true
      ram:
        required: true
      java:
        required: true
      software:
        required: false
        default: 'paper.json'
      version:
        required: false
        default: 'latest'

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 355 
    steps:
      - name: Setup Dynamic Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java }}

      - name: Fetch Orchestrator Scripts
        uses: actions/checkout@v3

      - name: Pull Cloud Storage Array
        run: |
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git storage_repo
          mkdir -p server-env
          cp -r storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}/* server-env/ 2>/dev/null || echo "New instance — starting fresh."

      - name: Install Node Dependencies
        run: npm install ws

      - name: Start Tunnel & Register IP
        run: |
          npm install -g localtunnel
          lt --port 8080 > /tmp/tunnel.log 2>&1 &
          LT_PID=$!
          echo "LT_PID=$LT_PID" >> $GITHUB_ENV

          for i in $(seq 1 30); do
            TUNNEL_LINE=$(cat /tmp/tunnel.log 2>/dev/null | grep -o 'https://[a-zA-Z0-9.-]*\.loca\.lt' | head -1)
            if [ -n "$TUNNEL_LINE" ]; then
              break
            fi
            sleep 1
          done

          if [ -z "$TUNNEL_LINE" ]; then
            echo "::error::Tunnel failed to start. Check localtunnel logs."
            cat /tmp/tunnel.log
            exit 1
          fi

          WS_URL=$(echo "$TUNNEL_LINE" | sed 's|https://|wss://|')
          echo "Tunnel ready: $WS_URL"

          # FIREWALL BYPASS: Push IP directly to Cloud Storage via Git
          cd storage_repo
          mkdir -p ${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}
          
          echo "{\"ws\": \"$WS_URL\", \"status\": \"online\", \"updated\": $(date +%s)}" > ${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}/routing.json
          
          git config user.name "Absora Relay Engine"
          git config user.email "relay@absora.com"
          
          # Commit FIRST, then Pull (with conflict override), then Push
          git add .
          git commit -m "Node Route Update: Online" || true
          
          for i in {1..5}; do
            git pull origin main --rebase -X ours || true
            git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main && break || sleep 3
          done

      - name: Ignite Minecraft Engine
        run: |
          cd server-env
          node ../server.js \
            "${{ github.event.inputs.username }}" \
            "${{ github.event.inputs.ram }}" \
            "${{ github.event.inputs.software }}" \
            "${{ github.event.inputs.version }}"

      - name: Save & Relay Protocol
        if: always()
        run: |
          echo "Preparing instance directory..."
          TARGET_DIR="storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}"
          mkdir -p "$TARGET_DIR"

          # Write offline routing status before sync
          echo "{\"ws\": \"\", \"status\": \"offline\", \"updated\": $(date +%s)}" > server-env/routing.json

          echo "Syncing server files to cloud..."
          rsync -av --exclude='storage_repo' --exclude='*.log' server-env/ "$TARGET_DIR/"
          cp server-env/absora.log "$TARGET_DIR/" 2>/dev/null || true

          echo "Pushing state to cloud..."
          cd storage_repo
          git config user.name "Absora Relay Engine"
          git config user.email "relay@absora.com"
          
          # Commit FIRST, then Pull (with conflict override), then Push
          git add .
          git commit -m "Relay save: ${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}" || true
          
          for i in {1..5}; do
            git pull origin main --rebase -X ours || true
            git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main && break || sleep 3
          done

      - name: Trigger Next Relay (If Flag Set)
        if: always()
        run: |
          if [ -f "server-env/relay.flag" ]; then
            echo "Relay flag detected — dispatching next runner..."
            curl -s -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.ABSORA_PAT }}" \
              https://api.github.com/repos/AADI-playz23/mc-launch/actions/workflows/host.yml/dispatches \
              -d '{
                "ref": "main",
                "inputs": {
                  "username":    "${{ github.event.inputs.username }}",
                  "instance_id": "${{ github.event.inputs.instance_id }}",
                  "ram":         "${{ github.event.inputs.ram }}",
                  "java":        "${{ github.event.inputs.java }}",
                  "software":    "${{ github.event.inputs.software }}",
                  "version":     "${{ github.event.inputs.version }}"
                }
              }'
          else
            echo "No relay flag — clean shutdown."
          fi
