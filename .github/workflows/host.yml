name: Absora Engine
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      instance_id:
        required: true
        default: '1'
      version:
        required: true
      servername:
        required: true
      ram:
        required: true
      wipe_data:
        required: false
        default: 'false'
      uptime_quota:
        required: false
        default: '6'
      java_version:
        required: true
        default: '21'

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Dynamic Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java_version }}

      - name: Checkout Orchestrator
        uses: actions/checkout@v4
        with:
          path: orchestrator

      - name: Download Storage & Engine Repos
        run: |
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk.git engine
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git storage
          mkdir -p server-env
          if [ "${{ github.event.inputs.wipe_data }}" == "true" ]; then
             rm -rf storage/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }} || true
             cd storage && git config user.name "Absora Engine" && git config user.email "engine@absora.com" && git add . && git commit -m "Wipe data" || true && git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main && cd ..
          else
             cp -r storage/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}/* server-env/ || echo "New instance."
          fi

      - name: Fetch & Process Engine
        run: |
          cd server-env
          VERSION="${{ github.event.inputs.version }}"
          DOWNLOAD_URL=""
          for file in ../orchestrator/*.json; do
             URL=$(jq -r ".\"$VERSION\" // .versions[\"$VERSION\"] // empty" "$file" 2>/dev/null)
             if [ -n "$URL" ]; then
                DOWNLOAD_URL=$URL
                break
             fi
          done
          
          if [ -z "$DOWNLOAD_URL" ]; then exit 1; fi
          
          wget -O downloaded.jar "$DOWNLOAD_URL"
          
          if [[ "$DOWNLOAD_URL" == *"-installer.jar"* || "$DOWNLOAD_URL" == *"neoforge"* ]]; then
              java -jar downloaded.jar --installServer
              rm downloaded.jar
              if ls forge-*-universal.jar 1> /dev/null 2>&1; then
                  mv forge-*-universal.jar server.jar
              elif ls forge-*.jar 1> /dev/null 2>&1; then
                  FORGE_JAR=$(ls forge-*.jar | head -n 1)
                  mv "$FORGE_JAR" server.jar
              fi
          else
              mv downloaded.jar server.jar
          fi

      - name: Start Tunnels & Push IP
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz && tar -xzf bore-*.tar.gz && sudo mv bore /usr/local/bin/
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb && sudo dpkg -i cloudflared-linux-amd64.deb
          bore local 25565 --to bore.pub > bore.log 2>&1 &
          cloudflared tunnel --url http://localhost:8080 > cloudflared.log 2>&1 &
          sleep 15
          BORE_IP=$(grep -oE 'bore.pub:[0-9]+' bore.log | head -1)
          BORE_PORT=$(echo $BORE_IP | cut -d':' -f2)
          CF_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' cloudflared.log | head -1 | sed 's/https/wss/')
          FULL_DOMAIN="${{ github.event.inputs.servername }}.${{ secrets.CF_DOMAIN }}"
          
          JSON_DATA=$(cat <<EOF
          { "type": "SRV", "name": "_minecraft._tcp.$FULL_DOMAIN", "data": { "service": "_minecraft", "proto": "_tcp", "name": "$FULL_DOMAIN", "priority": 0, "weight": 0, "port": $BORE_PORT, "target": "bore.pub" } }
          EOF
          )
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records?type=SRV&name=_minecraft._tcp.$FULL_DOMAIN" -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" -H "Content-Type: application/json" | jq -r '.result[0].id')
          if [ "$RECORD_ID" != "null" ] && [ -n "$RECORD_ID" ]; then curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/$RECORD_ID" -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" -H "Content-Type: application/json" -d "$JSON_DATA"; else curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records" -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" -H "Content-Type: application/json" -d "$JSON_DATA"; fi
          
          cd engine
          mkdir -p ip
          FILE="ip/${{ github.event.inputs.username }}.json"
          if [ ! -f "$FILE" ]; then echo "{}" > "$FILE"; fi
          jq ".[\"${{ github.event.inputs.instance_id }}\"] = {\"ip\": \"$FULL_DOMAIN\", \"ws\": \"$CF_URL\"}" "$FILE" > tmp.json && mv tmp.json "$FILE"
          git config user.name "Absora Engine" && git config user.email "engine@absora.com"
          git add ip/ && git commit -m "Endpoints for ${{ github.event.inputs.username }}" || true
          git pull --rebase origin main || true
          git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk.git HEAD:main

      - name: Ignite Server
        run: |
          cd server-env
          echo "eula=true" > eula.txt
          cp ../orchestrator/server.js .
          npm install ws
          RAM="${{ github.event.inputs.ram }}"
          TOTAL_CORES=$(nproc)
          if [ "$RAM" == "4G" ]; then ALLOWED_CORES="0"; elif [ "$RAM" == "6G" ]; then ALLOWED_CORES="0,1"; else ALLOWED_CORES="0-$((TOTAL_CORES-1))"; fi
          taskset -c $ALLOWED_CORES node server.js ${{ github.event.inputs.username }} $RAM

      - name: Save & Relay Protocol
        if: always()
        run: |
          cd server-env
          if [ -f relay.flag ]; then RELAY="true"; else RELAY="false"; fi
          rm -f server.jar server.js relay.flag downloaded.jar && rm -rf node_modules package.json package-lock.json
          
          cd ../storage
          git config user.name "Absora Engine" && git config user.email "engine@absora.com"
          git pull https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git main --rebase || true
          mkdir -p ${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}
          cp -r ../server-env/* ${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}/
          git add . && git commit -m "Save session" || true
          git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main
          
          cd ../engine
          FILE="ip/${{ github.event.inputs.username }}.json"
          if [ -f "$FILE" ]; then
             jq "del(.[\"${{ github.event.inputs.instance_id }}\"])" "$FILE" > tmp.json && mv tmp.json "$FILE"
             git add ip/ && git commit -m "Server offline" || true
             git pull --rebase origin main || true
             git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk.git HEAD:main
          fi
          
          QUOTA=${{ github.event.inputs.uptime_quota }}
          NEW_QUOTA=$((QUOTA - 6))
          if [ "$RELAY" == "true" ] && [ "$NEW_QUOTA" -gt 0 ]; then
             curl -X POST "https://api.github.com/repos/AADI-playz23/mc-launch/actions/workflows/host.yml/dispatches" -H "Accept: application/vnd.github.v3+json" -H "Authorization: token ${{ secrets.ABSORA_PAT }}" -d "{\"ref\":\"main\",\"inputs\":{\"username\":\"${{ github.event.inputs.username }}\",\"instance_id\":\"${{ github.event.inputs.instance_id }}\",\"version\":\"${{ github.event.inputs.version }}\",\"servername\":\"${{ github.event.inputs.servername }}\",\"ram\":\"${{ github.event.inputs.ram }}\",\"wipe_data\":\"false\",\"uptime_quota\":\"$NEW_QUOTA\",\"java_version\":\"${{ github.event.inputs.java_version }}\"}}"
          fi
