name: LunarHost Engine
on:
  workflow_dispatch:
    inputs:
      username:
        description: 'The user starting the server'
        required: true
      version:
        description: 'Minecraft version to load'
        required: true
        default: '1.21.5'

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # VERIFICATION: Checking if Java 21 installed correctly
      - name: Verify Java Version
        run: |
          echo "Checking active Java version..."
          java -version

      - name: Checkout Orchestrator (mc-launch)
        uses: actions/checkout@v4
        with:
          path: orchestrator

      - name: Download Storage (mc-disk2) & Setup Engine (mc-disk)
        run: |
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk.git engine
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git storage
          
          mkdir -p server-env
          cp -r storage/${{ github.event.inputs.username }}/* server-env/ || echo "New user. Starting fresh."

      - name: Fetch Latest PaperMC Engine
        run: |
          VERSION=${{ github.event.inputs.version }}
          echo "Looking up Paper URL for Minecraft $VERSION from mc-launch..."
          
          # Read the versions.json file directly from the mc-launch (orchestrator) folder
          DOWNLOAD_URL=$(jq -r ".versions[\"$VERSION\"]" orchestrator/versions.json)
          
          if [ "$DOWNLOAD_URL" == "null" ] || [ -z "$DOWNLOAD_URL" ]; then
            echo "Error: Version $VERSION not found in versions.json!"
            exit 1
          fi
          
          echo "Downloading engine from: $DOWNLOAD_URL"
          
          # RENAMING: This downloads the Paper jar and forces the name to server.jar
          wget -O server-env/server.jar "$DOWNLOAD_URL"

      - name: Install Bore & Dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.ABSORA_PAT }}
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-*.tar.gz
          sudo mv bore /usr/local/bin/
          cd orchestrator
          npm install ws @octokit/rest

      - name: Start Network Tunnel
        env:
          GITHUB_TOKEN: ${{ secrets.ABSORA_PAT }}
        run: |
          cd orchestrator
          node tunnel.js ${{ github.event.inputs.username }} &
          sleep 5

      - name: Start Minecraft via WebSocket Wrapper
        run: |
          cd server-env
          echo "eula=true" > eula.txt
          cp ../orchestrator/wrapper.js .
          
          echo "Booting JVM with Java 21 and Aikar's Flags..."
          node wrapper.js ${{ github.event.inputs.username }}

      - name: Save World Data & Clean IP (mc-disk2 & mc-disk)
        if: always()
        run: |
          # 1. Save World Data
          rm -f server-env/server.jar 
          rm -f server-env/wrapper.js
          mkdir -p storage/${{ github.event.inputs.username }}
          cp -r server-env/* storage/${{ github.event.inputs.username }}/
          cd storage
          git config user.name "LunarHost Engine"
          git config user.email "engine@lunarhost.com"
          git add .
          git commit -m "Save session for ${{ github.event.inputs.username }}" || echo "No changes."
          git push

          # 2. Delete the IP file to mark server as offline
          cd ../engine
          git config user.name "LunarHost Engine"
          git config user.email "engine@lunarhost.com"
          rm -f ip/${{ github.event.inputs.username }}.txt
          git add .
          git commit -m "Server offline: remove IP for ${{ github.event.inputs.username }}" || echo "Already removed."
          git push
