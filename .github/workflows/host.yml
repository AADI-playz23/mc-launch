name: Run Server
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      instance_id:
        required: true
      ram:
        required: true
      java:
        required: true
      software:
        required: false
        default: 'paper.json'
      version:
        required: false
        default: 'latest'

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 380

    steps:
      - name: Setup Dynamic Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java }}

      - name: Fetch Orchestrator Scripts
        uses: actions/checkout@v3

      - name: Pull Cloud Storage Array
        run: |
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git storage_repo
          mkdir -p server-env
          cp -r storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}/* server-env/ 2>/dev/null || echo "New instance, starting fresh."
          
      - name: Install Dependencies
        run: npm install ws

      # FIX: Use a more reliable tunnel method with proper URL extraction
      # localtunnel's stdout format changed — we parse it robustly
      - name: Start Tunnel & Register IP
        run: |
          npm install -g localtunnel
          
          # Start tunnel in background, capture output to file
          lt --port 8080 > /tmp/tunnel_output.txt 2>&1 &
          TUNNEL_PID=$!
          echo $TUNNEL_PID > /tmp/tunnel.pid
          
          # Wait for tunnel to be ready (up to 30s)
          for i in $(seq 1 30); do
            sleep 1
            # FIX: Robust URL extraction - handle both old and new lt output formats
            HTTPS_URL=$(grep -oE 'https://[a-zA-Z0-9._-]+\.loca\.lt' /tmp/tunnel_output.txt | head -1)
            if [ -n "$HTTPS_URL" ]; then
              break
            fi
          done
          
          if [ -z "$HTTPS_URL" ]; then
            echo "ERROR: Could not get tunnel URL. Output was:"
            cat /tmp/tunnel_output.txt
            exit 1
          fi
          
          # Convert https:// to wss:// for WebSocket
          WS_URL=$(echo "$HTTPS_URL" | sed 's|https://|wss://|')
          echo "Tunnel ready: $WS_URL"
          
          # FIX: Retry the IP push up to 5 times to handle transient failures
          for attempt in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -d "instance_id=${{ github.event.inputs.instance_id }}&ws_url=${WS_URL}&status=online" \
              "http://abmchost.rf.gd/update_ip.php")
            echo "IP push attempt $attempt: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "IP registered successfully."
              break
            fi
            sleep 3
          done

      - name: Ignite Server
        run: |
          cd server-env
          node ../server.js \
            "${{ github.event.inputs.username }}" \
            "${{ github.event.inputs.ram }}" \
            "${{ github.event.inputs.software }}" \
            "${{ github.event.inputs.version }}"

      # FIX: This step always runs, even if server crashes
      - name: Save & Relay Protocol (Bulletproof Sync)
        if: always()
        run: |
          # FIX: Mark instance as offline before saving so frontend knows
          curl -s -X POST \
            -d "instance_id=${{ github.event.inputs.instance_id }}&ws_url=&status=offline" \
            "http://abmchost.rf.gd/update_ip.php" || true
          
          echo "Preparing Instance Directory..."
          TARGET_DIR="storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}"
          mkdir -p "$TARGET_DIR"
          
          echo "Syncing Volumes..."
          rsync -av \
            --exclude='storage_repo' \
            --exclude='*.pid' \
            --exclude='relay.flag' \
            server-env/ "$TARGET_DIR/"
          
          echo "Pushing State to Cloud..."
          cd storage_repo
          git config user.name "Absora Relay Engine"
          git config user.email "relay@absora.com"
          git add .
          git commit -m "Relay Save: ${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }} @ $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No state changes to save."
          
          # FIX: Retry push with rebase to avoid race conditions between concurrent saves
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main && break
            echo "Push attempt $attempt failed, retrying..."
            sleep 5
          done

      - name: Trigger Next 24/7 Relay
        if: always()
        run: |
          if [ -f "server-env/relay.flag" ]; then
            echo "Relay flag detected — triggering next runner..."
            curl -s -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.ABSORA_PAT }}" \
              https://api.github.com/repos/AADI-playz23/mc-launch/actions/workflows/run.yml/dispatches \
              -d '{
                "ref":"main",
                "inputs":{
                  "username":"${{ github.event.inputs.username }}",
                  "instance_id":"${{ github.event.inputs.instance_id }}",
                  "ram":"${{ github.event.inputs.ram }}",
                  "java":"${{ github.event.inputs.java }}",
                  "software":"${{ github.event.inputs.software }}",
                  "version":"${{ github.event.inputs.version }}"
                }
              }'
            echo "Next relay dispatched."
          fi
