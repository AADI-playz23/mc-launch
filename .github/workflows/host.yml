name: Run Server
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      instance_id:
        required: true
      ram:
        required: true
      java:
        required: true
      software:
        required: false
        default: 'paper.json'
      version:
        required: false
        default: 'latest'
      servername:
        required: true
        description: 'e.g. survival → survival.astrocore.qzz.io'

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Dynamic Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java }}

      - name: Fetch Orchestrator Scripts
        uses: actions/checkout@v3

      - name: Pull Cloud Storage Array
        run: |
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git storage_repo
          mkdir -p server-env
          cp -r storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}/* server-env/ 2>/dev/null || echo "New instance — starting fresh."

      - name: Install Node Dependencies
        run: npm install ws

      - name: Start Tunnels & Update DNS
        run: |

          # ════════════════════════════════════════════════════════════════
          #  TUNNEL 1 — WebSocket (port 8080)
          #  Cloudflare Tunnel → permanent wss://servername.astrocore.qzz.io
          #  Token created ONCE in Cloudflare Zero Trust dashboard.
          #  Same hostname every relay — never changes.
          # ════════════════════════════════════════════════════════════════
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /tmp/cloudflared
          chmod +x /tmp/cloudflared

          # Run tunnel using the token stored in GitHub secrets
          # In Zero Trust dashboard this tunnel is configured to route
          # servername.astrocore.qzz.io → localhost:8080
          /tmp/cloudflared tunnel --no-autoupdate run \
            --token "${{ secrets.CF_TUNNEL_TOKEN }}" \
            > /tmp/cf_tunnel.log 2>&1 &
          CF_PID=$!

          # Wait up to 45s for tunnel to connect
          for i in $(seq 1 45); do
            if grep -qiE "registered|connection established|connected to" /tmp/cf_tunnel.log 2>/dev/null; then
              echo "Cloudflare tunnel connected (attempt $i)"
              break
            fi
            sleep 1
          done
          echo "=== cloudflared log ==="
          cat /tmp/cf_tunnel.log || true

          SERVERNAME="${{ github.event.inputs.servername }}"
          # WebSocket URL is PERMANENT — same every relay, no random ports
          WS_URL="wss://${SERVERNAME}.astrocore.qzz.io"
          echo "WS → $WS_URL (Cloudflare Tunnel — permanent)"

          # ════════════════════════════════════════════════════════════════
          #  TUNNEL 2 — Minecraft TCP (port 25565)
          #  bore → random port → Cloudflare DNS A+SRV updated each relay
          #  Players always use servername.astrocore.qzz.io (SRV handles port)
          # ════════════════════════════════════════════════════════════════
          curl -sSL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C /tmp
          chmod +x /tmp/bore

          /tmp/bore local 25565 --to bore.pub > /tmp/bore_mc.log 2>&1 &

          # Wait up to 45s for bore MC port
          for i in $(seq 1 45); do
            MC_PORT=$(grep -oP 'listening at bore\.pub:\K[0-9]+' /tmp/bore_mc.log 2>/dev/null | head -1)
            if [ -n "$MC_PORT" ]; then break; fi
            sleep 1
          done

          if [ -z "$MC_PORT" ]; then
            echo "::error::Bore MC tunnel failed."
            cat /tmp/bore_mc.log
            exit 1
          fi
          echo "MC → bore.pub:${MC_PORT}"

          # ── Resolve bore.pub real IP ──────────────────────────────────
          BORE_IP=$(dig +short bore.pub A | grep -E '^\d+\.\d+\.\d+\.\d+$' | head -1)
          if [ -z "$BORE_IP" ]; then
            BORE_IP=$(curl -s "https://dns.google/resolve?name=bore.pub&type=A" \
              | grep -oP '"data":"\K[\d.]+' | head -1)
          fi
          echo "bore.pub IP → $BORE_IP"

          FULL_HOST="${SERVERNAME}.astrocore.qzz.io"
          CF_ZONE_ID="${{ secrets.CF_ZONE_ID }}"
          CF_API_TOKEN="${{ secrets.CF_API_TOKEN }}"

          # ── Upsert Cloudflare A record ────────────────────────────────
          EXISTING_ID=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=A&name=${FULL_HOST}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            | grep -oP '"id":"\K[^"]+' | head -1)

          cat > /tmp/cf_a.json << JSONEOF
{"type":"A","name":"${FULL_HOST}","content":"${BORE_IP}","ttl":60,"proxied":false}
JSONEOF

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating A record → $BORE_IP"
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${EXISTING_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data @/tmp/cf_a.json
          else
            echo "Creating A record ${FULL_HOST} → $BORE_IP"
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data @/tmp/cf_a.json
          fi

          # ── Upsert SRV record (so MC client finds the right bore port) ─
          OLD_SRV_ID=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=SRV&name=_minecraft._tcp.${FULL_HOST}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            | grep -oP '"id":"\K[^"]+' | head -1)

          [ -n "$OLD_SRV_ID" ] && curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${OLD_SRV_ID}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json"

          cat > /tmp/cf_srv.json << JSONEOF
{"type":"SRV","name":"_minecraft._tcp.${FULL_HOST}","data":{"service":"_minecraft","proto":"_tcp","name":"${FULL_HOST}","priority":0,"weight":5,"port":${MC_PORT},"target":"bore.pub"},"ttl":60}
JSONEOF

          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @/tmp/cf_srv.json

          echo "DNS updated: ${FULL_HOST} → ${BORE_IP} (A) + bore.pub:${MC_PORT} (SRV)"

          # ── Register both in PHP backend ──────────────────────────────
          curl -s -X POST \
            -d "instance_id=${{ github.event.inputs.instance_id }}&ws_url=${WS_URL}&mc_address=${FULL_HOST}&bore_mc_port=${MC_PORT}&status=online&username=${{ github.event.inputs.username }}&servername=${SERVERNAME}" \
            "http://abmchost.rf.gd/update_ip.php"

      - name: Ignite Minecraft Server
        run: |
          cd server-env
          node ../server.js \
            "${{ github.event.inputs.username }}" \
            "${{ github.event.inputs.ram }}" \
            "${{ github.event.inputs.software }}" \
            "${{ github.event.inputs.version }}"

      - name: Mark Instance Offline
        if: always()
        run: |
          curl -s -X POST \
            -d "instance_id=${{ github.event.inputs.instance_id }}&ws_url=&mc_address=&status=offline&username=${{ github.event.inputs.username }}" \
            "http://abmchost.rf.gd/update_ip.php" || true

      - name: Save & Relay Protocol
        if: always()
        run: |
          TARGET_DIR="storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}"
          mkdir -p "$TARGET_DIR"
          rsync -av --exclude='storage_repo' --exclude='*.log' server-env/ "$TARGET_DIR/"
          cd storage_repo
          git config user.name "Absora Relay Engine"
          git config user.email "relay@absora.com"
          git pull origin main --rebase || true
          git add .
          git diff --staged --quiet || git commit -m "Relay save: ${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}"
          git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main

      - name: Trigger Next Relay (if relay flag set)
        if: always()
        run: |
          if [ -f "server-env/relay.flag" ]; then
            echo "Relay flag detected — dispatching next runner..."
            curl -s -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.ABSORA_PAT }}" \
              https://api.github.com/repos/AADI-playz23/mc-launch/actions/workflows/run.yml/dispatches \
              -d '{
                "ref": "main",
                "inputs": {
                  "username":    "${{ github.event.inputs.username }}",
                  "instance_id": "${{ github.event.inputs.instance_id }}",
                  "ram":         "${{ github.event.inputs.ram }}",
                  "java":        "${{ github.event.inputs.java }}",
                  "software":    "${{ github.event.inputs.software }}",
                  "version":     "${{ github.event.inputs.version }}",
                  "servername":  "${{ github.event.inputs.servername }}"
                }
              }'
          else
            echo "No relay flag — clean shutdown."
          fi
