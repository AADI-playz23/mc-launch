name: AstroCore Engine
on:
  workflow_dispatch:
    inputs:
      username:
        description: 'The user starting the server'
        required: true
      version:
        description: 'Minecraft version to load'
        required: true
        default: '1.21.11'
      servername:
        description: 'Custom subdomain for the server'
        required: true
        default: 'play'

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node & Java 21
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Checkout Orchestrator
        uses: actions/checkout@v4
        with:
          path: orchestrator

      - name: Download Storage & Engine
        run: |
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk.git engine
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git storage
          mkdir -p server-env
          cp -r storage/${{ github.event.inputs.username }}/* server-env/ || echo "New user."

      - name: Fetch Latest Engine
        run: |
          VERSION=${{ github.event.inputs.version }}
          DOWNLOAD_URL=$(jq -r ".versions[\"$VERSION\"]" orchestrator/versions.json)
          wget -O server-env/server.jar "$DOWNLOAD_URL"

      - name: Install Tunnels
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xzf bore-*.tar.gz
          sudo mv bore /usr/local/bin/
          
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Establish Dual Tunnels & Publish Static IPs
        run: |
          bore local 25565 --to bore.pub > bore.log 2>&1 &
          cloudflared tunnel --url http://localhost:8080 > cloudflared.log 2>&1 &
          
          echo "Waiting for tunnels to stabilize..."
          sleep 8
          
          # Extract endpoints
          BORE_IP=$(grep -oE 'bore.pub:[0-9]+' bore.log | head -1)
          BORE_PORT=$(echo $BORE_IP | cut -d':' -f2)
          CF_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' cloudflared.log | head -1 | sed 's/https/wss/')
          
          FULL_DOMAIN="${{ github.event.inputs.servername }}.${{ secrets.CF_DOMAIN }}"
          
          echo "Updating Cloudflare DNS for $FULL_DOMAIN to port $BORE_PORT..."
          
          JSON_DATA=$(cat <<EOF
          {
            "type": "SRV",
            "name": "_minecraft._tcp.$FULL_DOMAIN",
            "data": {
              "service": "_minecraft",
              "proto": "_tcp",
              "name": "$FULL_DOMAIN",
              "priority": 0,
              "weight": 0,
              "port": $BORE_PORT,
              "target": "bore.pub"
            }
          }
          EOF
          )
          
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records?type=SRV&name=_minecraft._tcp.$FULL_DOMAIN" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
            
          if [ "$RECORD_ID" != "null" ] && [ -n "$RECORD_ID" ]; then
             curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records/$RECORD_ID" \
                  -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                  -H "Content-Type: application/json" \
                  -d "$JSON_DATA"
          else
             curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records" \
                  -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                  -H "Content-Type: application/json" \
                  -d "$JSON_DATA"
          fi
          
          cd engine
          mkdir -p ip
          echo "{\"ip\": \"$FULL_DOMAIN\", \"ws\": \"$CF_URL\"}" > ip/${{ github.event.inputs.username }}.json
          
          git config user.name "AstroCore Engine"
          git config user.email "engine@astrocore.com"
          git add ip/
          git commit -m "Endpoints generated for ${{ github.event.inputs.username }}" || echo "No changes"
          git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk.git HEAD:main

      - name: Ignite Server Core
        run: |
          cd server-env
          echo "eula=true" > eula.txt
          cp ../orchestrator/server.js .
          npm install ws
          node server.js ${{ github.event.inputs.username }}

      - name: Save Data & Clean Endpoints
        if: always()
        run: |
          rm -f server-env/server.jar server-env/server.js
          rm -rf server-env/node_modules server-env/package.json server-env/package-lock.json
          
          cd storage
          git config user.name "AstroCore Engine"
          git config user.email "engine@astrocore.com"
          
          git pull https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git main --rebase || true
          
          mkdir -p ${{ github.event.inputs.username }}
          cp -r ../server-env/* ${{ github.event.inputs.username }}/
          
          git add .
          git commit -m "Save session for ${{ github.event.inputs.username }}" || echo "No changes"
          git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main

          cd ../engine
          rm -f ip/${{ github.event.inputs.username }}.json
          git add .
          git commit -m "Server offline: scrub IP for ${{ github.event.inputs.username }}" || echo "Already removed"
          git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk.git HEAD:main
