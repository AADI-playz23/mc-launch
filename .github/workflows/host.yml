name: Run Server
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      instance_id:
        required: true
      ram:
        required: true
      java:
        required: true
      software:
        required: false
        default: 'paper.json'
      version:
        required: false
        default: 'latest'
      servername:
        required: true
        description: 'e.g. survival  →  survival.astrocore.qzz.io'

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Dynamic Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java }}

      - name: Fetch Orchestrator Scripts
        uses: actions/checkout@v3

      - name: Pull Cloud Storage Array
        run: |
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git storage_repo
          mkdir -p server-env
          cp -r storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}/* server-env/ 2>/dev/null || echo "New instance — starting fresh."

      - name: Install Node Dependencies
        run: npm install ws

      - name: Start Tunnels & Update Cloudflare DNS
        run: |

          # ── Install bore ──────────────────────────────────────────────
          curl -sSL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz -C /usr/local/bin bore
          chmod +x /usr/local/bin bore

          # ── Tunnel 1: WebSocket port 8080 (console panel) ─────────────
          bore local 8080 --to bore.pub > /tmp/bore_ws.log 2>&1 &

          # ── Tunnel 2: Minecraft TCP port 25565 (players) ──────────────
          bore local 25565 --to bore.pub > /tmp/bore_mc.log 2>&1 &

          # ── Wait up to 45s for BOTH tunnels ───────────────────────────
          for i in $(seq 1 45); do
            WS_PORT=$(grep -oP 'listening at bore\.pub:\K[0-9]+' /tmp/bore_ws.log 2>/dev/null | head -1)
            MC_PORT=$(grep -oP 'listening at bore\.pub:\K[0-9]+' /tmp/bore_mc.log 2>/dev/null | head -1)
            if [ -n "$WS_PORT" ] && [ -n "$MC_PORT" ]; then break; fi
            sleep 1
          done

          if [ -z "$WS_PORT" ] || [ -z "$MC_PORT" ]; then
            echo "::error::Bore tunnel(s) failed to start."
            echo "=== WS ===" && cat /tmp/bore_ws.log
            echo "=== MC ===" && cat /tmp/bore_mc.log
            exit 1
          fi

          WS_URL="wss://bore.pub:${WS_PORT}"
          echo "WS  tunnel → $WS_URL"
          echo "MC  tunnel → bore.pub:${MC_PORT}"

          # ── Resolve bore.pub to its actual IP ─────────────────────────
          # We need the raw IP to put in the Cloudflare DNS A record
          BORE_IP=$(dig +short bore.pub | grep -oP '^\d+\.\d+\.\d+\.\d+' | head -1)
          echo "bore.pub IP → $BORE_IP"

          if [ -z "$BORE_IP" ]; then
            echo "::error::Could not resolve bore.pub to an IP."
            exit 1
          fi

          SERVERNAME="${{ github.event.inputs.servername }}"
          CF_ZONE_ID="${{ secrets.CF_ZONE_ID }}"
          CF_API_TOKEN="${{ secrets.CF_API_TOKEN }}"
          DOMAIN="astrocore.qzz.io"
          FULL_HOST="${SERVERNAME}.${DOMAIN}"

          # ── Check if a DNS record already exists for this subdomain ───
          EXISTING=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=A&name=${FULL_HOST}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")

          RECORD_ID=$(echo "$EXISTING" | grep -oP '"id":"\K[^"]+' | head -1)

          if [ -n "$RECORD_ID" ]; then
            # ── UPDATE existing A record to new bore.pub IP ─────────────
            echo "Updating existing DNS A record $RECORD_ID → $BORE_IP"
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${RECORD_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"A\",
                \"name\": \"${FULL_HOST}\",
                \"content\": \"${BORE_IP}\",
                \"ttl\": 60,
                \"proxied\": false
              }"
          else
            # ── CREATE new A record ──────────────────────────────────────
            echo "Creating new DNS A record ${FULL_HOST} → $BORE_IP"
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"A\",
                \"name\": \"${FULL_HOST}\",
                \"content\": \"${BORE_IP}\",
                \"ttl\": 60,
                \"proxied\": false
              }"
          fi

          # ── SRV record so players connect on the right MC port ─────────
          # Without SRV, Minecraft defaults to port 25565.
          # bore.pub:MC_PORT is non-25565, so we need an SRV record:
          # _minecraft._tcp.SERVERNAME.astrocore.qzz.io → bore.pub:MC_PORT
          # First remove old SRV if exists
          OLD_SRV=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=SRV&name=_minecraft._tcp.${FULL_HOST}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")
          OLD_SRV_ID=$(echo "$OLD_SRV" | grep -oP '"id":"\K[^"]+' | head -1)
          if [ -n "$OLD_SRV_ID" ]; then
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${OLD_SRV_ID}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json"
          fi

          # Create fresh SRV record pointing to bore.pub:MC_PORT
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"type\": \"SRV\",
              \"data\": {
                \"service\": \"_minecraft\",
                \"proto\": \"_tcp\",
                \"name\": \"${FULL_HOST}\",
                \"priority\": 0,
                \"weight\": 5,
                \"port\": ${MC_PORT},
                \"target\": \"bore.pub\"
              },
              \"ttl\": 60
            }"

          echo "DNS updated: ${FULL_HOST} → ${BORE_IP} (A) + bore.pub:${MC_PORT} (SRV)"

          # ── Register WS URL + MC address in PHP backend ───────────────
          MC_ADDRESS="${FULL_HOST}"
          curl -s -X POST \
            -d "instance_id=${{ github.event.inputs.instance_id }}&ws_url=${WS_URL}&mc_address=${MC_ADDRESS}&bore_mc_port=${MC_PORT}&status=online&username=${{ github.event.inputs.username }}&servername=${{ github.event.inputs.servername }}" \
            "http://abmchost.rf.gd/update_ip.php"

      - name: Ignite Minecraft Server
        run: |
          cd server-env
          node ../server.js \
            "${{ github.event.inputs.username }}" \
            "${{ github.event.inputs.ram }}" \
            "${{ github.event.inputs.software }}" \
            "${{ github.event.inputs.version }}"

      - name: Mark Instance Offline
        if: always()
        run: |
          curl -s -X POST \
            -d "instance_id=${{ github.event.inputs.instance_id }}&ws_url=&mc_address=&status=offline&username=${{ github.event.inputs.username }}" \
            "http://abmchost.rf.gd/update_ip.php" || true

      - name: Save & Relay Protocol
        if: always()
        run: |
          TARGET_DIR="storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}"
          mkdir -p "$TARGET_DIR"
          rsync -av --exclude='storage_repo' --exclude='*.log' server-env/ "$TARGET_DIR/"

          cd storage_repo
          git config user.name "Absora Relay Engine"
          git config user.email "relay@absora.com"
          git pull origin main --rebase || true
          git add .
          git diff --staged --quiet || git commit -m "Relay save: ${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}"
          git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main

      - name: Trigger Next Relay (if relay flag set)
        if: always()
        run: |
          if [ -f "server-env/relay.flag" ]; then
            echo "Relay flag detected — dispatching next runner..."
            curl -s -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${{ secrets.ABSORA_PAT }}" \
              https://api.github.com/repos/AADI-playz23/mc-launch/actions/workflows/run.yml/dispatches \
              -d '{
                "ref": "main",
                "inputs": {
                  "username":    "${{ github.event.inputs.username }}",
                  "instance_id": "${{ github.event.inputs.instance_id }}",
                  "ram":         "${{ github.event.inputs.ram }}",
                  "java":        "${{ github.event.inputs.java }}",
                  "software":    "${{ github.event.inputs.software }}",
                  "version":     "${{ github.event.inputs.version }}",
                  "servername":  "${{ github.event.inputs.servername }}"
                }
              }'
          else
            echo "No relay flag — clean shutdown."
          fi
