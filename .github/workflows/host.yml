name: Run Server
on:
  workflow_dispatch:
    inputs:
      username:
        required: true
        type: string
      instance_id:
        required: true
        type: string
      ram:
        required: true
        type: string
      java:
        required: true
        type: string
      software:
        required: false
        default: 'paper.json'
        type: string
      version:
        required: false
        default: 'latest'
        type: string
      servername:
        required: false
        default: 'server'
        type: string

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 380

    steps:
      - name: Setup Dynamic Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: ${{ github.event.inputs.java }}

      - name: Fetch Orchestrator Scripts
        uses: actions/checkout@v3

      - name: Pull Cloud Storage
        run: |
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git storage_repo
          mkdir -p server-env
          cp -r storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}/* server-env/ 2>/dev/null || echo "New instance."

      - name: Install Dependencies
        run: |
          npm install ws
          ls -la server.js || { echo "ERROR: server.js not found in repo root!"; exit 1; }

      - name: Install Bore
        run: |
          BORE_VERSION=$(curl -sL https://api.github.com/repos/ekzhang/bore/releases/latest \
            | grep -oP '"tag_name":\s*"\Kv[^"]+')
          echo "Installing bore ${BORE_VERSION}..."
          curl -sL "https://github.com/ekzhang/bore/releases/download/${BORE_VERSION}/bore-${BORE_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz
          chmod +x bore && sudo mv bore /usr/local/bin/bore
          bore --version

      - name: Install Cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared && sudo mv cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Start Tunnels & Update DNS
        run: |
          SERVERNAME="${{ github.event.inputs.servername }}"
          CF_TOKEN="${{ secrets.CF_API_TOKEN }}"
          CF_ZONE="${{ secrets.CF_ZONE_ID }}"
          SUBDOMAIN="${SERVERNAME}.astrocore.qzz.io"

          # Detect proxy vs standard software to pick correct local port
          SOFTWARE="${{ github.event.inputs.software }}"
          echo "Software input received: [${SOFTWARE}]"
          case "${SOFTWARE}" in
            proxies.json)
              LOCAL_MC_PORT=25577
              echo "Proxy detected: tunneling port 25577"
              ;;
            *)
              LOCAL_MC_PORT=25565
              echo "Standard detected: tunneling port 25565"
              ;;
          esac
          echo "LOCAL_MC_PORT=${LOCAL_MC_PORT}"

          # ── Bore: LOCAL_MC_PORT → bore.pub:RANDOM_PORT ─────────────────────
          # FIX: Use random high ports to avoid collision with other bore users.
          # With fixed ports (25565-25569), multiple servers fight for the same
          # 5 ports on bore.pub — causing "runner runs but IP doesn't work".
          # SRV record carries the port, so Minecraft resolves it automatically.
          MC_PORT=""
          for ATTEMPT in 1 2 3 4 5; do
            TRY_PORT=$(shuf -i 10000-60000 -n 1)
            echo "Attempt ${ATTEMPT}: trying bore port ${TRY_PORT}..."
            bore local ${LOCAL_MC_PORT} --to bore.pub --port ${TRY_PORT} > /tmp/bore_mc.txt 2>&1 &
            BORE_PID=$!
            sleep 6
            MC_PORT=$(grep -oP 'listening at bore\.pub:\K[0-9]+' /tmp/bore_mc.txt | head -1)
            if [ -n "$MC_PORT" ]; then
              echo "Bore secured: bore.pub:${MC_PORT} → localhost:${LOCAL_MC_PORT}"
              break
            else
              echo "Port ${TRY_PORT} failed, retrying with new random port..."
              kill $BORE_PID 2>/dev/null || true
              sleep 2
              MC_PORT=""
            fi
          done

          # -- Cloudflared: WS console 8080 -> trycloudflare.com ---------------
          cloudflared tunnel --url http://localhost:8080 --no-autoupdate --no-chunked-encoding > /tmp/cf_ws.txt 2>&1 &

          echo "Waiting for Cloudflared..."
          CF_URL=""
          for i in $(seq 1 90); do
            sleep 1
            CF_URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/cf_ws.txt | head -1)
            [ -n "$CF_URL" ] && break
          done

          [ -z "$MC_PORT" ] && { echo "=== bore failed -- all attempts exhausted ===" && cat /tmp/bore_mc.txt && exit 1; }
          [ -z "$CF_URL" ]  && { echo "=== cloudflared failed ===" && cat /tmp/cf_ws.txt && exit 1; }

          echo "MC tunnel : bore.pub:${MC_PORT}"
          echo "WS tunnel : ${CF_URL}"

          # -- CNAME: SUBDOMAIN -> bore.pub ------------------------------------
          # Why CNAME not A record:
          #   bore.pub IP changes every relay (new runner = new bore server).
          #   An A record caches the OLD IP even after relay -- players can't connect.
          #   A CNAME delegates resolution to bore.pub itself, so every fresh
          #   connection resolves bore.pub directly and always gets the live IP.
          #   TTL=1 so the SRV port update also flushes within 1 second.

          # Delete any stale A record first (A and CNAME can't coexist)
          A_EXISTING=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/dns_records?type=A&name=${SUBDOMAIN}" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json")
          A_ID=$(echo "$A_EXISTING" | grep -oP '"id":"\K[^"]+' | head -1)
          if [ -n "$A_ID" ]; then
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/dns_records/${A_ID}" \
              -H "Authorization: Bearer ${CF_TOKEN}" | grep -o '"success":[a-z]*'
            echo "Deleted stale A record"
          fi

          # Upsert CNAME: SUBDOMAIN -> bore.pub (TTL=1 minimum, near-instant flush)
          CNAME_EXISTING=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/dns_records?type=CNAME&name=${SUBDOMAIN}" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json")
          CNAME_ID=$(echo "$CNAME_EXISTING" | grep -oP '"id":"\K[^"]+' | head -1)

          CNAME_BODY=$(printf '{"type":"CNAME","name":"%s","content":"bore.pub","ttl":1,"proxied":false}' \
            "${SUBDOMAIN}")

          if [ -n "$CNAME_ID" ]; then
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/dns_records/${CNAME_ID}" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$CNAME_BODY" | grep -o '"success":[a-z]*'
          else
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/dns_records" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$CNAME_BODY" | grep -o '"success":[a-z]*'
          fi
          echo "CNAME updated: ${SUBDOMAIN} -> bore.pub (TTL=1)"

          # -- SRV record ------------------------------------------------------
          # SRV tells Minecraft clients which port to use on the domain.
          # Flow: player types SUBDOMAIN -> SRV -> SUBDOMAIN:MC_PORT
          #       -> CNAME -> bore.pub -> bore tunnel -> MC server
          SRV_NAME="_minecraft._tcp.${SERVERNAME}"
          SRV_EXISTING=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/dns_records?type=SRV&name=${SRV_NAME}.astrocore.qzz.io" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json")
          SRV_ID=$(echo "$SRV_EXISTING" | grep -oP '"id":"\K[^"]+' | head -1)

          # FIX: Removed trailing dot from target — Cloudflare normalizes FQDNs
          SRV_BODY=$(printf '{"type":"SRV","name":"%s","ttl":1,"data":{"service":"_minecraft","proto":"_tcp","name":"%s","priority":0,"weight":5,"port":%s,"target":"%s"}}' \
            "${SRV_NAME}" "${SUBDOMAIN}" "${MC_PORT}" "${SUBDOMAIN}")

          if [ -n "$SRV_ID" ]; then
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/dns_records/${SRV_ID}" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$SRV_BODY" | grep -o '"success":[a-z]*'
          else
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/dns_records" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$SRV_BODY" | grep -o '"success":[a-z]*'
          fi
          echo "SRV updated: ${SRV_NAME}.astrocore.qzz.io -> ${SUBDOMAIN}:${MC_PORT}"
          echo ""
          echo "=============================================="
          echo "  Players connect to: ${SUBDOMAIN}"
          echo "  (SRV handles port -- no port number needed)"
          echo "  Direct bore:        bore.pub:${MC_PORT}"
          echo "  SRV port:           ${MC_PORT}"
          echo "=============================================="

          # -- Session file for WS console -------------------------------------
          # FIX: Added retry logic on git push to handle concurrent pushes
          git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-launch.git session_repo
          SESSION_FILE="session_repo/session/${{ github.event.inputs.username }}-${{ github.event.inputs.instance_id }}.json"
          mkdir -p session_repo/session
          MC_CONNECT="${{ github.event.inputs.servername }}.astrocore.qzz.io"
          echo "{\"ws\":\"${CF_URL}\",\"status\":\"online\",\"mc_host\":\"bore.pub\",\"mc_port\":${MC_PORT},\"ip\":\"${MC_CONNECT}\",\"updated\":$(date +%s)}" > "${SESSION_FILE}"
          cd session_repo
          git config user.name "Absora Engine" && git config user.email "engine@absora.com"
          git add "session/${{ github.event.inputs.username }}-${{ github.event.inputs.instance_id }}.json"
          git commit -m "Session online: ${{ github.event.inputs.username }}-${{ github.event.inputs.instance_id }}" || true
          for attempt in 1 2 3; do
            git pull --rebase origin main &&
            git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-launch.git HEAD:main && break
            echo "Session push attempt ${attempt} failed, retrying..."
            sleep 3
          done
          cd ..
          echo "Session file written."

      - name: Ignite Server
        run: |
          cp server.js server-env/server.js
          cp -r node_modules server-env/node_modules
          cd server-env
          node server.js \
            "${{ github.event.inputs.username }}" \
            "${{ github.event.inputs.ram }}" \
            "${{ github.event.inputs.software }}" \
            "${{ github.event.inputs.version }}" \
            "${{ github.event.inputs.servername }}"

      - name: Save & Relay Protocol
        if: always()
        run: |
          # ── Mark session offline ──────────────────────────────────────────
          if [ -d "session_repo" ]; then
            cd session_repo
          else
            git clone https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-launch.git session_repo
            cd session_repo
          fi
          mkdir -p session
          echo "{\"ws\":\"\",\"status\":\"offline\",\"updated\":$(date +%s)}" \
            > "session/${{ github.event.inputs.username }}-${{ github.event.inputs.instance_id }}.json"
          git config user.name "Absora Engine"
          git config user.email "engine@absora.com"
          git add "session/${{ github.event.inputs.username }}-${{ github.event.inputs.instance_id }}.json"
          git commit -m "Session offline: ${{ github.event.inputs.username }}-${{ github.event.inputs.instance_id }}" || true
          for attempt in 1 2 3; do
            git pull --rebase origin main &&
            git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-launch.git HEAD:main && break
            echo "Offline push attempt ${attempt} failed, retrying..."
            sleep 3
          done
          cd ..

          # ── Save server files to storage repo ─────────────────────────────
          TARGET_DIR="storage_repo/${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }}"
          mkdir -p "$TARGET_DIR"
          rsync -av \
            --exclude='storage_repo' \
            --exclude='session_repo' \
            --exclude='relay.flag' \
            --exclude='*.pid' \
            --exclude='*.log' \
            server-env/ "$TARGET_DIR/"

          cd storage_repo
          git config user.name "Absora Relay Engine"
          git config user.email "relay@absora.com"
          git add .
          git commit -m "Save: ${{ github.event.inputs.username }}/instance_${{ github.event.inputs.instance_id }} @ $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes."

          for attempt in 1 2 3; do
            git pull --rebase origin main && \
            git push https://${{ secrets.ABSORA_PAT }}@github.com/AADI-playz23/mc-disk2.git HEAD:main && break
            echo "Push attempt ${attempt} failed, retrying..."
            sleep 5
          done

      - name: Trigger Next Relay
        if: always()
        run: |
          if [ -f "server-env/relay.flag" ]; then
            echo "Relay flag detected -- dispatching next runner..."
            curl -s -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: Bearer ${{ secrets.ABSORA_PAT }}" \
              -H "Content-Type: application/json" \
              https://api.github.com/repos/AADI-playz23/mc-launch/actions/workflows/host.yml/dispatches \
              -d "$(printf '{"ref":"main","inputs":{"username":"%s","instance_id":"%s","ram":"%s","java":"%s","software":"%s","version":"%s","servername":"%s"}}' \
                '${{ github.event.inputs.username }}' \
                '${{ github.event.inputs.instance_id }}' \
                '${{ github.event.inputs.ram }}' \
                '${{ github.event.inputs.java }}' \
                '${{ github.event.inputs.software }}' \
                '${{ github.event.inputs.version }}' \
                '${{ github.event.inputs.servername }}')"
            echo "Next relay dispatched."
          fi
